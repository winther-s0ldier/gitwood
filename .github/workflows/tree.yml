name: Update Gitwood

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: initial (first setup) or update (incremental)'
        required: false
        default: 'update'
        type: choice
        options:
          - update
          - initial

jobs:
  update-tree:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Gitwood
        run: |
          python gitwood.py \
            --username "${{ github.repository_owner }}" \
            --token "${{ secrets.GH_TOKEN }}" \
            --mode "${{ github.event.inputs.mode || 'update' }}"

      - name: Commit updated tree
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Gitwood 🌳"
          file_pattern: "gitwood.svg gitwood.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
